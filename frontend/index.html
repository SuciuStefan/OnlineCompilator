<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Compiler 101</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.min.js" integrity="sha512-hJEMjfR4ds7mXbBot3i/R+CsiyYpeWSezXul8uLBT8wXAHPUdhRgl4LLTtMGwjarftGKiQqK1v20XScm0ANTPQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.css" integrity="sha512-7vaQ4LLdaXd2IuMd4MUQ6LRFIGbEwJI1aq6KYqL3RjbdQyUkRFhwZKmqmkBXurTFdGlx687lTN8FSJfX6Df8Gw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/devicon/2.16.0/devicon.min.css">
    <!-- C++ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/mode/clike/clike.min.js" integrity="sha512-jcF10R6LSoLddMx32eEitiBfJ8icHBobh0Z7fwVewrKmNBBGM0B09oG3yxxnkIYwilUsXBbIcRN5jfmc6vSt9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/theme/dracula.min.css" integrity="sha512-gFMl3u9d0xt3WR8ZeW05MWm3yZ+ZfgsBVXLSOiFz2xeVrZ8Neg0+V1kkRIo9LikyA/T9HuS91kDfc2XWse0K0A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    
</head>
    <body>
        <div class="app-container">
            <header class="toolbar">TOOLBAR
                <button id="runButton" type="button"> Run ▶ </button>
            </header>
            <aside class="sidebar">
                <div class="sidebar-header">
                <button id="toggle_retractabil"> « </button> 
                <span class="menu-label">SIDEBAR</span>
                <script>
                    let varButton=document.getElementById("toggle_retractabil");
                    let varAppContainer=document.querySelector(".app-container");
                    varButton.addEventListener("click",function()
                    {
                        varAppContainer.classList.toggle("menu-closed");
                    });
                </script>
                </div>
                <div class="sidebar-nav">
                    <div class="group-title">
                        <i class="fa-solid fa-folder"></i>
                        <span>FILES</span>
                    </div>
                    <div class="group-title">
                        <i class="devicon-cplusplus-plain"></i>
                        <span>LANGUAGE</span>
                    </div>
                    <div class="group-title">
                        <i class="fa-solid fa-gear"></i>
                        <span>SETTINGS</span>
                    </div>
                    <div class="group-title">
                        <i class="fa-solid fa-robot"></i>
                        <span>Coming Soon...</span>
                    </div>
                </div>
            </aside>
            <main class="editor">
                <div class="editor-header">EDITOR</div>
                <textarea id="editorSource" name="editorSource" title="Code editor for writing code">
#include <iostream>
using namespace std;
int main() {
    cout << "Hello, World!" << endl;
    return 0;
}
                </textarea>
            </main>
            <div class="console" id="consoleOutput">CONSOLA</div>
            <footer class="futer">@2025,December,Created by Suciu Dinu Ștefan</footer>
        </div>
    <script src="script.js"></script>
    </body>
</html>
</html>

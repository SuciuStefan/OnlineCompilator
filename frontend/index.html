<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Compiler 101</title>

    <!-- CodeMirror — editorul de cod cu numerotare linii și syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/theme/dracula.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Moduri de limbaj pentru CodeMirror (C/C++, Python, Rust) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/mode/clike/clike.min.js"   crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/mode/python/python.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/mode/rust/rust.min.js"     crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Iconuri și fonturi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/devicon/2.16.0/devicon.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Source+Code+Pro:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap">

    <!-- JSZip — folosit la salvarea proiectului întreg ca .zip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Containerul principal — folosește CSS Grid pentru layout-ul întregii pagini -->
<div id="container-principal">

    <!-- ── BARA DE SUS (toolbar) ─────────────────────────────── -->
    <header id="bara-sus">

        <!-- Buton split Salvare: click stânga = salvare rapidă, săgeată = meniu extins -->
        <div class="grup-buton-split">
            <button class="buton-principal buton-salvare" id="buton-salveaza" type="button">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <button class="buton-sageata buton-salvare" id="sageata-salvare" type="button" aria-label="Optiuni salvare">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="meniu-dropdown" id="dropdown-salvare">
                <button class="optiune-dropdown" data-actiune="salveaza-fisier">
                    <i class="fa-solid fa-file-arrow-down"></i>
                    <span>Save active tab</span>
                    <small>Downloads the current file</small>
                </button>
                <button class="optiune-dropdown" data-actiune="salveaza-proiect">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Save whole project</span>
                    <small>Downloads all files as .zip</small>
                </button>
            </div>
        </div>

        <!-- Buton split Rulare: click stânga = rulare fișier activ, săgeată = meniu extins -->
        <div class="grup-buton-split">
            <button class="buton-principal buton-rulare" id="buton-ruleaza" type="button">
                <i class="fa-solid fa-play"></i> Run
            </button>
            <button class="buton-sageata buton-rulare" id="sageata-rulare" type="button" aria-label="Optiuni rulare">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="meniu-dropdown" id="dropdown-rulare">
                <button class="optiune-dropdown" data-actiune="ruleaza-fisier">
                    <i class="fa-solid fa-file-code"></i>
                    <span>Run active tab</span>
                    <small>Compiles only the current file</small>
                </button>
                <button class="optiune-dropdown" data-actiune="ruleaza-proiect">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>Run whole project</span>
                    <small>Compiles all source files together</small>
                </button>
            </div>
        </div>

    </header>

    <!-- ── BARA LATERALĂ (sidebar) ───────────────────────────── -->
    <aside id="bara-laterala">

        <!-- Antetul barei laterale cu butonul de restrângere -->
        <div id="antet-bara-laterala">
            <button id="buton-restrânge">«</button>
            <span id="eticheta-meniu">SIDEBAR</span>
        </div>

        <!-- Navigarea principală din sidebar -->
        <nav id="navigare-sidebar">

            <!-- Secțiunea FILES — afișează fișierele din proiect -->
            <div class="titlu-sectiune" id="toggle-fisiere">
                <i class="fa-solid fa-folder"></i>
                <span>FILES</span>
                <i class="fa-solid fa-chevron-down sageata-sectiune" id="sageata-fisiere"></i>
            </div>
            <div class="panou-sectiune" id="panou-fisiere">
                <!-- Buton pentru încărcarea fișierelor de pe disc -->
                <div class="titlu-sectiune buton-upload" id="buton-upload-fisier">
                    <i class="fa-solid fa-file-arrow-up"></i>
                    <span>Upload File...</span>
                </div>
                <!-- Lista fișierelor din proiect — populată dinamic din script.js -->
                <div id="lista-fisiere"></div>
            </div>
            <!-- Input ascuns — declanșat programatic la click pe buton-upload-fisier -->
            <input type="file" id="input-fisier" accept=".cpp,.c,.h,.hpp,.py,.java,.rs,.js" multiple>

            <!-- Secțiunea LANGUAGE — selectarea limbajului de programare -->
            <div class="titlu-sectiune" id="toggle-limbaj">
                <i id="icona-limbaj" class="devicon-cplusplus-plain"></i>
                <span>LANGUAGE</span>
                <i class="fa-solid fa-chevron-down sageata-sectiune" id="sageata-limbaj"></i>
            </div>
            <div class="panou-sectiune" id="panou-limbaj">
                <!-- Butoanele de limbaj sunt generate dinamic în script.js -->
                <div id="optiuni-limbaj"></div>
            </div>

            <!-- Secțiunea SETTINGS — font și dimensiune text -->
            <div class="titlu-sectiune" id="toggle-setari">
                <i class="fa-solid fa-gear"></i>
                <span>SETTINGS</span>
                <i class="fa-solid fa-chevron-down sageata-sectiune" id="sageata-setari"></i>
            </div>
            <div class="panou-sectiune" id="panou-setari">
                <div class="eticheta-subsectiune">Font Family</div>
                <div id="optiuni-font">
                    <button class="buton-font activ" data-font="'JetBrains Mono', monospace">JetBrains Mono</button>
                    <button class="buton-font" data-font="'Fira Code', monospace">Fira Code</button>
                    <button class="buton-font" data-font="'Source Code Pro', monospace">Source Code Pro</button>
                    <button class="buton-font" data-font="'Courier New', monospace">Courier New</button>
                    <button class="buton-font" data-font="Consolas, monospace">Consolas</button>
                    <button class="buton-font" data-font="'Comic Sans MS', cursive">Comic Sans</button>
                    <button class="buton-font" data-font="Wingdings">Wingdings</button>
                </div>
                <!-- Slider pentru dimensiunea fontului — valoarea curentă afișată live -->
                <div class="eticheta-subsectiune marime-titlu">
                    Font Size — <span id="afisaj-marime">13px</span>
                </div>
                <div id="control-marime">
                    <span class="limita-marime">10</span>
                    <input type="range" id="slider-marime" min="10" max="40" value="13" step="1">
                    <span class="limita-marime">40</span>
                </div>
            </div>

            <!-- Placeholder pentru funcționalități viitoare (AI assistant) -->
            <div class="titlu-sectiune">
                <i class="fa-solid fa-robot"></i>
                <span>Coming Soon...</span>
            </div>

        </nav>
    </aside>

    <!-- ── ZONA EDITORULUI ────────────────────────────────────── -->
    <main id="zona-editor">

        <!-- Bara cu tab-uri deschise + eticheta statică "EDITOR" -->
        <div id="bara-taburi">
            <!-- Tab-urile fișierelor deschise sunt generate dinamic din script.js -->
            <div id="container-taburi"></div>
            <!-- Eticheta decorativă fixă — nu este interactivă -->
            <div class="tab tab-static">EDITOR</div>
        </div>

        <!-- Textarea-ul inițial — CodeMirror îl înlocuiește automat la inițializare -->
        <textarea id="sursa-editor" name="sursa-editor" title="Editor de cod">
#include &lt;iostream&gt;
using namespace std;
int main() {
    cout &lt;&lt; "Hello, World!" &lt;&lt; endl;
    return 0;
}</textarea>

    </main>

    <!-- ── PANOUL DE JOS (stdin + output) ────────────────────── -->
    <div id="panou-jos">

        <!-- Bara STDIN — colapsabilă, trimite input spre programul rulat -->
        <div id="bara-stdin">
            <i class="fa-solid fa-terminal"></i>
            <span>STDIN</span>
            <span id="indiciu-stdin">Input for your program (cin, input(), Scanner…)</span>
            <i class="fa-solid fa-chevron-down sageata-sectiune" id="sageata-stdin"></i>
        </div>
        <div id="corp-stdin">
            <textarea
                id="text-stdin"
                placeholder="Type program input here, one value per line..."
                spellcheck="false"
            ></textarea>
        </div>

        <!-- Zona de output — afișează rezultatul compilării/rulării -->
        <div id="zona-output"></div>

    </div>

    <footer id="subsol">@2025, December — Created by Suciu Dinu Ștefan</footer>

</div><!-- /container-principal -->

<script src="script.js"></script>
</body>
</html>
